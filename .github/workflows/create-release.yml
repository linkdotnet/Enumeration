name: Create new Release

on:
  workflow_dispatch:
    inputs:
      versionIncrement:
        description: 'The new version. For example: 1.1.0'
        required: true
      prerelease:
        description: 'Is this a pre-release?'
        type: boolean
        required: false
        default: false

jobs:
  release:
    name: Publish new release
    runs-on: ubuntu-latest
    steps:

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.PAT }}
        persist-credentials: true
        fetch-depth: 0

    - name: Get last tag
      id: last_tag
      run: |
        LAST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)
        if [ -z "$LAST_TAG" ]; then
          LAST_TAG="v0.0.0"
        fi
        echo "tag=$LAST_TAG" >> $GITHUB_OUTPUT
        echo "version=${LAST_TAG#v}" >> $GITHUB_OUTPUT

    - name: Validate version
      run: |
        VERSION=${{ github.event.inputs.versionIncrement }}
        LAST_VERSION=${{ steps.last_tag.outputs.version }}
        
        # Check if version is a valid semantic version (major.minor.patch)
        if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Error: Version '$VERSION' is not a valid semantic version (major.minor.patch)"
          exit 1
        fi
        
        # Check if version is higher than last version
        if [ "$(printf '%s\n%s' "$LAST_VERSION" "$VERSION" | sort -V | head -n1)" == "$VERSION" ] && [ "$VERSION" != "$LAST_VERSION" ]; then
          echo "Error: Version '$VERSION' is not higher than last version '$LAST_VERSION'"
          exit 1
        elif [ "$VERSION" == "$LAST_VERSION" ]; then
          echo "Error: Version '$VERSION' is equal to last version '$LAST_VERSION'"
          exit 1
        fi

    - name: Get changelog entries
      id: changelog
      uses: mindsers/changelog-reader-action@v2
      with:
        version: Unreleased
        path: ./CHANGELOG.md

    - name: Setup dotnet
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: | 
          10.0.x

    - name: Update CHANGELOG file
      uses: thomaseizinger/keep-a-changelog-new-release@3.1.0
      with:
        version: ${{ github.event.inputs.versionIncrement }}

    - name: Set git config
      run: |
        git config --local user.email "linkdotnet@action.com"
        git config --local user.name "LinkDotNet Bot"

    - name: Commit changes and push changes
      run: |
        git add CHANGELOG.md
        git commit -m "Update Changelog.md for ${{github.event.inputs.versionIncrement}} release"
        git push origin main

    - name: Create release on GitHub
      uses: thomaseizinger/create-release@2.0.0
      env:
        GITHUB_TOKEN: ${{ secrets.PAT }}
      with:
        tag_name: v${{ github.event.inputs.versionIncrement }}
        target_commitish: ${{ env.RELEASE_COMMIT_HASH }}
        name: v${{ github.event.inputs.versionIncrement }}
        body: ${{ steps.changelog.outputs.changes }}
        draft: false
        prerelease: ${{ github.event.inputs.prerelease }}

    - name: Create release package
      run: |
        dotnet pack src/LinkDotNet.Enumeration/LinkDotNet.Enumeration.csproj -c RELEASE -p:PackageVersion=${{ github.event.inputs.versionIncrement }} --property:PackageOutputPath=${GITHUB_WORKSPACE}/packages /p:ContinuousIntegrationBuild=true --nologo

    - name: Upload to nuget
      run: |
        dotnet nuget push ${GITHUB_WORKSPACE}/packages/*.nupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate
